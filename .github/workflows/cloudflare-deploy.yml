name: Deploy Cloudflare App

on:
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: "Deploy Cloudflare Worker API"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      apply_d1_migrations:
        description: "Apply D1 migrations before deploy"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
    paths:
      - "workers/**"
      - "migrations/**"
      - "wrangler.toml"
      - ".github/workflows/cloudflare-deploy.yml"

jobs:
  deploy-worker:
    name: Deploy Worker API
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.deploy_worker == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN secret" >&2
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret" >&2
            exit 1
          fi

      - name: Install Wrangler
        run: npm install --no-save wrangler

      - name: Apply D1 migrations
        if: github.event_name == 'workflow_dispatch' && inputs.apply_d1_migrations == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply iit-jee-question-bank --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
