name: Migrate R2 Assets From SQLite

on:
  workflow_dispatch:
    inputs:
      google_drive_file_id:
        description: "Google Drive file ID of the old SQLite .db file"
        required: true
        type: string
      migrate_large_payloads:
        description: "Move large old JSON/text payloads to R2 and update D1 pointers"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      migrate_images:
        description: "Move old image BLOBs/files to R2 and insert question_images rows"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      keep_existing_images:
        description: "Keep existing question_images rows instead of clearing them first"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  migrate-r2-assets:
    name: Move SQLite assets into R2 and update D1
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Missing CLOUDFLARE_API_TOKEN secret" >&2
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Missing CLOUDFLARE_ACCOUNT_ID secret" >&2
            exit 1
          fi

      - name: Install tools
        run: |
          npm install --no-save wrangler
          python -m pip install --upgrade pip
          python -m pip install gdown

      - name: Download SQLite DB from Google Drive
        run: |
          gdown "${{ inputs.google_drive_file_id }}" -O question_bank.db
          ls -lh question_bank.db
          python - <<'PY'
          import os, sqlite3
          path = 'question_bank.db'
          if os.path.getsize(path) < 1024:
              raise SystemExit('Downloaded file is too small. Check Google Drive sharing: Anyone with the link -> Viewer.')
          conn = sqlite3.connect(path)
          tables = conn.execute("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name").fetchall()
          print('Tables:', [t[0] for t in tables])
          conn.close()
          PY

      - name: Generate R2 objects and D1 update SQL
        run: |
          SKIP_LARGE=""
          SKIP_IMAGES=""
          KEEP_IMAGES=""
          if [ "${{ inputs.migrate_large_payloads }}" = "false" ]; then SKIP_LARGE="--skip-large-payloads"; fi
          if [ "${{ inputs.migrate_images }}" = "false" ]; then SKIP_IMAGES="--skip-images"; fi
          if [ "${{ inputs.keep_existing_images }}" = "true" ]; then KEEP_IMAGES="--keep-existing-images"; fi
          python scripts/d1_migrate_r2_assets.py --db question_bank.db --out r2_migration_out $SKIP_LARGE $SKIP_IMAGES $KEEP_IMAGES
          cat r2_migration_out/R2_MANIFEST.json

      - name: Upload generated objects to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python - <<'PY'
          import json, subprocess, sys
          manifest = json.load(open('r2_migration_out/R2_MANIFEST.json'))
          objects = manifest.get('r2_objects', [])
          print(f'Uploading {len(objects)} objects to R2')
          for i, obj in enumerate(objects, 1):
              if i == 1 or i % 100 == 0 or i == len(objects):
                  print(f'[{i}/{len(objects)}] {obj["key"]}', flush=True)
              subprocess.check_call([
                  'npx', 'wrangler', 'r2', 'object', 'put',
                  'iit-jee-question-bank-assets/' + obj['key'],
                  '--file', obj['file'],
                  '--remote'
              ])
          PY

      - name: Apply D1 pointer/image updates
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 execute iit-jee-question-bank --remote --file=r2_migration_out/r2_d1_updates.sql

      - name: Verify image count
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute iit-jee-question-bank --remote --command "SELECT COUNT(*) AS question_images FROM question_images;"
          npx wrangler d1 execute iit-jee-question-bank --remote --command "SELECT COUNT(*) AS exams_with_r2_payload FROM exams WHERE payload_json LIKE '%r2_key%';"
